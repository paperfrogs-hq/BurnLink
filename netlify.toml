[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["ejs"]
  included_files = ["views/**", "public/**"]

[[redirects]]
  from = "https://sharefile0x1.netlify.app/*"
  to = "https://burnlink.page/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://sharefile0x1.netlify.app/*"
  to = "https://burnlink.page/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/"
  to = "/.netlify/functions/app"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/app/:splat"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
# CSP is intentionally omitted here — Express sets a nonce-based CSP on every
# response. If netlify.toml also set a CSP, browsers would enforce BOTH headers
# simultaneously (stricter wins), blocking the nonce-allowed inline key-capture
# script on /s/* pages and preventing location.hash from being cleared.
# All other security headers below are safe to set at the CDN layer.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
