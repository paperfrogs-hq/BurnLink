[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["ejs"]
  included_files = ["views/**", "public/**"]

[[redirects]]
  from = "https://sharefile0x1.netlify.app/*"
  to = "https://burnlink.page/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://sharefile0x1.netlify.app/*"
  to = "https://burnlink.page/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/"
  to = "/.netlify/functions/app"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/app/:splat"
  status = 200
